<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="50%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#14141f"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="28" fill="url(#bg)"/>
  <!-- Guitar pick outline -->
  <path d="M60 14C34 14 18 38 18 60c0 26 18 46 42 46s42-20 42-46c0-22-16-46-42-46z" stroke="url(#grad)" stroke-width="4" filter="url(#glow)"/>
  <!-- Guitar body -->
  <path d="M60 34c-8 0-13 5-13 12 0 5 3 9 7 11-5 3-8 9-8 15 0 11 9 20 20 18h-8c-3 0-5 2-5 5s2 5 5 5h28c3 0 5-2 5-5s-2-5-5-5h-8c11 2 20-7 20-18 0-6-3-12-8-15 4-2 7-6 7-11 0-7-5-12-13-12-4 0-7 2-10 5-3-3-6-5-10-5z" fill="url(#grad)" filter="url(#glow)"/>
  <!-- Sound hole -->
  <circle cx="60" cy="62" r="7" fill="#0a0a12"/>
  <!-- Sound waves -->
  <path d="M78 42c6 8 6 20 0 28" stroke="#ff00ff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M86 36c9 11 9 29 0 40" stroke="#00f0ff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
